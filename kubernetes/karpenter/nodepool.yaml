# Karpenter EC2NodeClass + NodePool for the alpha-k-eks cluster.
# Discovers subnets/security groups tagged karpenter.sh/discovery=alpha-k-eks
# (tagged by the terraform karpenter module) and launches AL2023 nodes using
# the alpha-k-eks-karpenter-node-role.
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  role: alpha-k-eks-karpenter-node-role
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: alpha-k-eks
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: alpha-k-eks
  tags:
    karpenter.sh/discovery: alpha-k-eks
    Project: alpha-k
    ManagedBy: karpenter
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t3.medium", "t3.large", "t3a.medium", "t3a.large"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      expireAfter: 720h
  limits:
    cpu: "100"
    memory: 200Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
